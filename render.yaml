services:
  - type: web
    name: space-resource-exchange
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: space-resource-exchange-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /

databases:
  - name: space-resource-exchange-db
    databaseName: space_resource_exchange
    user: srx_user
    plan: free
